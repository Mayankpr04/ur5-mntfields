arm_mntfields_explorer:
  ros__parameters:
    # RealSense defaults. Adjust if your realsense2_camera namespace differs.
    depth_topic: /camera/camera/aligned_depth_to_color/image_raw
    color_topic: /camera/camera/color/image_raw
    camera_info_topic: /camera/camera/aligned_depth_to_color/camera_info
    joint_state_topic: /joint_states
    base_frame: base_link
    camera_frame: camera_color_optical_frame
    tool_frame: tool0
    visualization_frame: base_link
    ur_type: ur5
    output_dir: /home/mayank/ur_ws/src/ur5_real_training

    # PLACEHOLDER: tool0 -> camera_color_optical_frame.
    # Keep this numerically consistent with the static TF in
    # launch/ur_mntfields_arm_real.launch.py. Replace after hand-eye calibration.
    # Row-major 4x4 transform: camera_pose = tool_pose @ camera_in_tool.
    camera_in_tool: [1.0, 0.0, 0.0, 0.10,
                     0.0, 1.0, 0.0, 0.00,
                     0.0, 0.0, 1.0, 0.00,
                     0.0, 0.0, 0.0, 1.00]

    # Runtime ROI/obstacle boxes. Publish std_msgs/String on /scene_boxes to update.
    # Format examples:
    #   {"frame":"base_link","boxes":[[0.70,0.0,0.60,0.50,0.80,0.80]]}
    #   0.70,0.0,0.60,0.50,0.80,0.80;0.90,0.0,0.60,0.04,0.80,0.80
    scene_boxes_topic: /scene_boxes
    scene_boxes_frame: base_link
    scene_boxes: [""]

    voxel_size_m: 0.05
    raycast_stride_px: 8
    depth_min_m: 0.20
    depth_max_m: 2.00
    enable_robot_self_filter: true
    robot_self_filter_padding_m: 0.05
    robot_self_filter_tool_radius_m: 0.08
    robot_self_filter_mount_radius_m: 0.07

    clearance_backend: sdf
    sdf_voxel_size_m: 0.04
    sdf_padding_m: 0.75
    sdf_max_cells: 4000000

    sample_pairs_per_step: 2048
    samples_per_ik_seed: 32
    sampling_mode: joint_local_6d
    sampling_proposal_batch_size: 512
    clearance_margin_m: 0.15
    clearance_offset_m: 0.0
    clearance_label_floor: 0.0
    clearance_label_power: 1.0
    anchor_seed_probability: 0.35
    train_epochs_per_step: 120
    train_every_n_frames: 1
    replay_buffer_capacity: 100000
    train_minibatch_size: 2048
    train_replay_ratio: 0.75
    replay_recombine_pairs_per_step: 2048
    adaptive_training_enabled: true
    field_ready_sample_pairs_per_step: 2048
    field_ready_train_epochs_per_step: 120
    field_ready_train_every_n_frames: 1
    field_ready_replay_recombine_pairs_per_step: 2048
    field_ready_hard_failed_pairs_per_step: 128
    path_centered_pair_fraction: 0.10
    near_boundary_pair_fraction: 0.35
    path_anchor_stride: 4
    path_anchor_buffer_limit: 4096
    hard_failed_pairs_per_step: 128
    hard_failed_anchor_buffer_limit: 4096
    hard_failed_clearance_window_m: 0.08

    step_size_q: 0.03
    rollout_max_steps: 120
    execution_planner: field
    collision_aware_field_rollout: true
    field_local_rollout_candidates: 32

    # Hardware default: do not command the real robot until explicitly enabled
    # from the launch command line.
    enable_trajectory_publish: false
    trajectory_topic: /ur_mntfields_arm/joint_trajectory
    trajectory_collision_margin_m: 0.04
    trajectory_max_joint_speed: 0.10
    trajectory_min_segment_dt: 0.65
    trajectory_waypoint_stride: 3
    trajectory_smoothing_window: 5
    execute_prefix_waypoints: 20
    execute_prefix_min_duration_s: 6.0
    replan_while_executing: false
    trajectory_busy_margin_s: 0.25

    save_every_n_steps: 1
    checkpoint_every_epochs: 120
    enable_field_diagnostics: false
    field_diagnostics_max_rows: 4096
    field_diagnostics_grid_size: 61
    field_td_loss_weight: 0.001
    field_speed_loss_weight: 0.01
    field_direct_speed_loss_weight: 0.0
    field_normal_loss_weight: 0.001
    field_normal_cos_loss_weight: 0.0
    field_near_obstacle_loss_weight: 0.0
    field_low_speed_threshold: 0.20
    field_low_speed_pred_max: 0.30
    field_low_speed_penalty_weight: 0.0
    field_effective_speed_floor: 0.04
    field_diag_gate_enabled: true
    field_diag_gate_min_replay_pairs: 12000
    field_diag_max_low_overpred_frac: 0.45
    field_diag_min_speed_corr: 0.35
    field_diag_min_near_far_gap: 0.20
    field_diag_min_normal_cos_near: 0.20

    debug_point_cloud_topic: /debug/points/world
    planned_path_topic: /ur_mntfields_arm/planned_path
    enable_frontier_roi_filter: true
    enable_object_roi_nbv: true
    object_roi_nbv_first: true
    rank_frontiers_when_roi_available: false
    fast_roi_nbv: true
    roi_nbv_max_pose_candidates: 18
    enable_view_self_occlusion_filter: true
    min_view_self_occlusion_free_fraction: 0.80
    view_self_occlusion_padding_m: 0.03
    min_frontier_visibility_score: 0.0
    min_roi_coverage_ratio: 0.0
    min_view_alignment: 0.60
    frontier_roi_init_min_points: 300
    frontier_roi_init_min_step: 1
    frontier_roi_padding_xyz: [0.12, 0.12, 0.12]
    cabinet_bbox_padding_xyz: [0.04, 0.04, 0.04]
    roi_clip_frame: base_link
    roi_clip_min_xyz: [-2.0, -2.0, -0.20]
    roi_clip_max_xyz: [2.0, 2.0, 2.0]
    finish_when_frontiers_exhausted: true
    finish_when_roi_covered: true
    finish_when_field_eval_passes: false
    roi_coverage_threshold: 0.82
    roi_unknown_stop_voxels: 40

    # Startup gate should match the real inspection pose you choose.
    enable_startup_pose_gate: false
    inspection_positions: [0.0, -2.74850, 1.50004, -1.71994, -1.57000, 0.03334]
    pose_reached_tolerance_rad: 0.15
    startup_data_collection_delay_s: 2.0

trajectory_executor:
  ros__parameters:
    trajectory_action_name: /scaled_joint_trajectory_controller/follow_joint_trajectory
    direct_publish_topic: ""
    enable_startup_home: false
    enable_startup_inspection: false
    enable_startup_wiggle: false
    pose_reached_tolerance_rad: 0.05
