rgbd_field_curobo_pipeline:
  ros__parameters:
    color_topic: /camera/camera/color/image_raw
    depth_topic: /camera/camera/aligned_depth_to_color/image_raw
    camera_info_topic: /camera/camera/aligned_depth_to_color/camera_info
    base_frame: base_link
    camera_frame: camera_color_optical_frame
    output_dir: /home/mayank/ur_ws/src/mntfields_rgbd_output
    save_color: true
    save_depth_npy: true
    depth_scale: 0.001
    min_depth: 0.15
    max_depth: 2.5
    n_rays: 5000
    n_strat_samples: 8
    dist_behind_surf: 0.4
    sample_min: 0.07
    sample_max: 0.30
    num_pairs: 10000
    scale_factor: 1.0
    bound_padding_xy: 0.05
    bound_padding_z: 0.05
    sync_slop_sec: 0.05
    queue_size: 10
    capture_stride: 1
    min_translation_m: 0.0
    min_rotation_deg: 0.0
    random_seed: 0
    train_every_n_captures: 4
    train_epochs: 20
    max_raw_rows: 120000
    max_train_rows: 30000
    model_dir: /home/mayank/ur_ws/src/mntfields_rgbd_model
    model_device: cuda:0
    model_lr: 0.0001
    save_training_dumps: true
    rollout_step_size: 0.05
    rollout_alpha: 0.8
    rollout_max_steps: 120
    rollout_goal_tolerance: 0.05
    enable_curobo: false
    curobo_follow_mode: final_pose
    curobo_anchor_stride: 8
    trajectory_topic: /ur_mntfields_arm/joint_trajectory
    curobo_robot_config: ""
    curobo_scene_config: ""
    curobo_tool_frame: ""
    curobo_device: cuda:0
    curobo_warmup_iterations: 5
    enable_nbv: false
    nbv_roi_center: [0.55, 0.0, 0.75]
    scene_boxes:
      - "0.83,0.35,0.90,0.04,1.40,1.80"
      - "0.69,-0.33,0.90,0.28,0.04,1.80"
      - "0.69,1.03,0.90,0.28,0.04,1.80"
      - "0.69,0.35,1.78,0.28,1.40,0.04"
      - "0.69,0.35,0.02,0.28,1.40,0.04"
      - "0.69,0.35,0.46,0.24,1.32,0.02"
      - "0.69,0.35,0.90,0.24,1.32,0.02"
      - "0.69,0.35,1.34,0.24,1.32,0.02"
    scene_boxes_frame: world
    nbv_bbox_padding_xyz: [0.02, 0.02, 0.02]
    nbv_preferred_standoff_m: 0.30
    nbv_lateral_offsets: [-0.20, 0.0, 0.20]
    nbv_height_offsets: [-0.18, 0.0, 0.18]
    nbv_num_azimuth_samples: 12
    nbv_min_view_change_m: 0.15
    nbv_goal_reached_tolerance_m: 0.08
    nbv_command_cooldown_s: 3.0
